name: Product qualification

on:
  push:
  pull_request:

jobs:
  native-matrix:
    name: ${{ matrix.name }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            runner: windows-2025
          - name: windows-aarch64
            runner: windows-11-arm
          - name: linux-x86_64
            runner: ubuntu-24.04
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
          - name: macos-x86_64
            runner: macos-15-intel
          - name: macos-aarch64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - if: matrix.name != 'windows-aarch64'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0
          cache: false
      - if: matrix.name == 'windows-aarch64'
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP 'zig-x86_64-windows-0.16.0.zip'
          Invoke-WebRequest 'https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip' -OutFile $archive
          $actual = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          if ($actual -ne '68659eb5f1e4eb1437a722f1dd889c5a322c9954607f5edcf337bc3684a75a7e') {
            throw "unexpected Zig archive SHA-256: $actual"
          }
          Expand-Archive $archive -DestinationPath $env:RUNNER_TEMP
          (Join-Path $env:RUNNER_TEMP 'zig-x86_64-windows-0.16.0') | Out-File -FilePath $env:GITHUB_PATH -Append
      - if: runner.os == 'Linux'
        run: zig fmt --check build.zig build.zig.zon src tests tools
      - if: matrix.name != 'windows-aarch64'
        run: zig build qualification-native -j1 --cache-dir "${{ runner.temp }}/gravity-zig-cache" --global-cache-dir "${{ runner.temp }}/gravity-zig-global-cache"
      - if: matrix.name == 'windows-aarch64'
        run: zig build qualification-native -Dtarget=aarch64-windows -j1 --cache-dir "${{ runner.temp }}/gravity-zig-cache" --global-cache-dir "${{ runner.temp }}/gravity-zig-global-cache"

  wasm:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
      - uses: bytecodealliance/actions/wasmtime/setup@v1
      - run: zig build wasm-validate -j1
      - run: zig build test-pipeline-long-run-wasm -j1
      - run: zig build abi-wasm-smoke -j1

  demo:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - run: pnpm --dir demo/web exec playwright install --with-deps chromium
      - run: zig build demo-test -j1
      - run: zig build demo-isolation -j1

  reproducible-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - run: zig build release-check -j1 -p "${RUNNER_TEMP}/gravity-prefix-a" --cache-dir "${{ runner.temp }}/gravity-zig-cache-a" --global-cache-dir "${{ runner.temp }}/gravity-zig-global-a"
      - run: zig build release-check -j1 -p "${RUNNER_TEMP}/gravity-prefix-b" --cache-dir "${{ runner.temp }}/gravity-zig-cache-b" --global-cache-dir "${{ runner.temp }}/gravity-zig-global-b"
      - run: node tools/release.mjs --compare "${RUNNER_TEMP}/gravity-prefix-a/release" "${RUNNER_TEMP}/gravity-prefix-b/release"
      - uses: actions/upload-artifact@v4
        with:
          name: gravity-1.0.0-release
          path: ${{ runner.temp }}/gravity-prefix-a/release
          if-no-files-found: error

  complete:
    if: always()
    needs: [native-matrix, wasm, demo, reproducible-release]
    runs-on: ubuntu-24.04
    steps:
      - run: test '${{ needs.native-matrix.result }}' = success
      - run: test '${{ needs.wasm.result }}' = success
      - run: test '${{ needs.demo.result }}' = success
      - run: test '${{ needs.reproducible-release.result }}' = success
