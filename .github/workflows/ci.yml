name: CI

on:
  push:
  pull_request:

jobs:
  linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig fmt --check .
      - run: zig build test-all-modes
      - run: zig build determinism
      - run: zig build abi-test
      - run: zig build fuzz
      - run: zig build benchmark
      - run: zig build performance-ci
